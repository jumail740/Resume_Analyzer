<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume - Resume Analyzer</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <!-- Back Button -->
            <a href="/dashboard/" class="back-btn">
                <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Dashboard
            </a>

            <h2>Upload Resume</h2>
            <p class="subtitle">Upload your resume and paste the job description for AI-powered analysis</p>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="input-group">
                    <label for="resume">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                            <polyline points="13 2 13 9 20 9"/>
                        </svg>
                        Resume File
                    </label>
                    <div class="file-upload-area">
                        <input type="file" name="resume" id="resume" accept=".pdf,.doc,.docx,.txt" required>
                        <div class="file-upload-preview">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <span class="file-name">Choose a file or drag and drop</span>
                        </div>
                        <small class="file-hint">Supported formats: PDF, DOC, DOCX, TXT (Max 5MB)</small>
                    </div>
                </div>

                <div class="input-group">
                    <label for="job_description">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                        </svg>
                        Job Description
                    </label>
                    <textarea name="job_description" placeholder="Paste the job description here..."></textarea>
                    <small class="textarea-hint">Paste the full job description for accurate analysis</small>
                </div>

                <button type="submit" class="analyze-btn">
                    <span>Analyze Resume</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // File upload preview functionality
        const fileInput = document.getElementById('resume');
        const filePreview = document.querySelector('.file-name');
        
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const fileName = this.files[0].name;
                const fileSize = (this.files[0].size / 1024 / 1024).toFixed(2);
                filePreview.textContent = `${fileName} (${fileSize} MB)`;
                filePreview.style.color = '#10b981';
            } else {
                filePreview.textContent = 'Choose a file or drag and drop';
                filePreview.style.color = '#6c757d';
            }
        });

        // Drag and drop functionality
        const dropArea = document.querySelector('.file-upload-area');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight() {
            dropArea.classList.add('drag-over');
        }

        function unhighlight() {
            dropArea.classList.remove('drag-over');
        }

        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            
            if (files && files[0]) {
                const fileName = files[0].name;
                const fileSize = (files[0].size / 1024 / 1024).toFixed(2);
                filePreview.textContent = `${fileName} (${fileSize} MB)`;
                filePreview.style.color = '#10b981';
            }
        }
    </script>
</body>
</html>
