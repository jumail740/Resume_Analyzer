<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/result.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>Analysis Result - Resume Analyzer</title>
</head>
<body>
    <div class="container">
        <div class="result-wrapper">
            <div class="result-header">
                <a href="/" class="back-btn">
                    <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Go Back
                </a>
                <div class="header-content">
                    <div class="icon-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 16v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                    </div>
                    <h2>Analysis Result</h2>
                    <p class="subtitle">Resume vs Job Description Analysis</p>
                </div>
                <div style="width: 80px;"></div> 
            </div>

            <div class="result-content">
                <pre id="raw-result" style="display: none;">{{ result }}</pre>
                <div id="parsed-result" class="markdown-body"></div>
            </div>

            <div class="result-footer">
                <button class="action-btn download-btn" onclick="downloadResult()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Download Result
                </button>
                <a href="/" class="action-btn new-analysis-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                    New Analysis
                </a>
            </div>
        </div>
    </div>

    <script>
        // Parse the markdown text into HTML
        document.addEventListener('DOMContentLoaded', function() {
            const rawText = document.getElementById('raw-result').innerText;
            const parsedContainer = document.getElementById('parsed-result');
            // Use marked.js to convert
            parsedContainer.innerHTML = marked.parse(rawText);
        });

        function downloadResult() {
            const resultText = document.getElementById('raw-result').innerText;
            const blob = new Blob([resultText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'resume_analysis_result.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
